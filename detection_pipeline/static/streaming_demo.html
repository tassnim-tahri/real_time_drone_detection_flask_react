<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live stream demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; }
    img { width: 100%; max-height: 70vh; object-fit: contain; background: #111; border-radius: 8px; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 8px; overflow: auto; }
    label { margin-right: 8px; }
    button { margin-top: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Live camera (MJPEG)</h1>
  <p>Open this page while <code>flask_app.py</code> is running on port 8000. Uses your default webcam (<code>CAMERA_INDEX</code> env).</p>
  <p>
    <label>Confidence <input id="thr" type="number" step="0.05" min="0" max="1" value="0.35" /></label>
    <button type="button" id="apply">Apply threshold</button>
  </p>
  <div>
    <!-- Same-origin so no CORS issues when served via Flask -->
    <img src="/video_feed" alt="Live detections stream" />
  </div>
  <h2>Stats (poll)</h2>
  <pre id="stats">Loading…</pre>
  <script>
    async function pollStats() {
      try {
        const r = await fetch("/api/stats");
        const j = await r.json();
        document.getElementById("stats").textContent = JSON.stringify(j, null, 2);
      } catch (e) {
        document.getElementById("stats").textContent = String(e);
      }
    }
    setInterval(pollStats, 1000);
    pollStats();

    document.getElementById("apply").onclick = async () => {
      const threshold = parseFloat(document.getElementById("thr").value);
      await fetch("/api/set_confidence", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ threshold }),
      });
      pollStats();
    };
  </script>
</body>
</html>
